<svg viewBox="0 0 1400 1380" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <!-- ================================================================
       FabMo platform diagram v09 — three sub-panels (a)(b)(c)
       palette: navy #2D2A6D  gold #FBB61B  lavender #E6E4EF  grey #565666
       =============================================================== -->
  <style>
    .navy{fill:#2D2A6D;} .gold{fill:#FBB61B;} .grey{fill:#565666;}
    .boxln{fill:#FFFFFF;stroke:#2D2A6D;stroke-width:2.5;}
    .navybox{fill:#2D2A6D;}
    .dash{fill:none;stroke:#2D2A6D;stroke-width:2.5;stroke-dasharray:7 6;}
    .lbl{fill:#2D2A6D;font-weight:bold;}
    .wht{fill:#FFFFFF;font-weight:bold;}
    text{dominant-baseline:middle;}
    .pl{fill:#2D2A6D;font-weight:bold;font-size:30px;}
  </style>

  <!-- ####################  PANEL (a) — GENERIC FabMo CONCEPT  #################### -->
  <text class="pl" x="22" y="372">(a)</text>

  <!-- onboard-the-tool dotted box -->
  <rect class="dash" x="334" y="235" width="1011" height="270" rx="4"/>

  <!-- Open Source Platform title (larger) + bracket spanning Dashboard..Motion Core -->
  <text class="navy" x="400" y="282" font-size="42" font-weight="bold" text-anchor="middle">FabMo</text>
  <text class="navy" x="400" y="309" font-size="15" font-weight="bold" letter-spacing="1.5" text-anchor="middle">OPEN SOURCE PLATFORM</text>
  <path d="M105,332 L105,320 L712,320 L712,332" fill="none" stroke="#2D2A6D" stroke-width="2"/>

  <!-- FabMo Dashboard (user device, outside the onboard box) -->
  <rect class="boxln" x="98" y="336" width="152" height="72" rx="3"/>
  <text class="navy" x="174" y="362" font-size="23" font-weight="bold" text-anchor="middle">FabMo</text>
  <text class="navy" x="174" y="386" font-size="23" font-weight="bold" text-anchor="middle">Dashboard</text>
  <text class="grey" x="174" y="426" font-size="15" text-anchor="middle">a User's device</text>

  <g class="gold"><rect x="252" y="364" width="58" height="16"/><path d="M310,358 L310,386 L334,372 Z"/></g>

  <!-- FabMo Engine -->
  <rect class="boxln" x="360" y="336" width="150" height="72" rx="3"/>
  <text class="navy" x="435" y="362" font-size="23" font-weight="bold" text-anchor="middle">FabMo</text>
  <text class="navy" x="435" y="386" font-size="23" font-weight="bold" text-anchor="middle">Engine</text>
  <g class="grey" font-size="14" text-anchor="middle">
    <text x="435" y="426">Fabrication System</text>
    <text x="435" y="443">Front-End Server</text>
    <text x="435" y="460">on Computer</text>
  </g>

  <g class="gold"><rect x="512" y="364" width="22" height="16"/><path d="M534,358 L534,386 L554,372 Z"/></g>

  <!-- Motion Core -->
  <rect class="navybox" x="556" y="336" width="156" height="72" rx="3"/>
  <text class="wht" x="634" y="373" font-size="26" text-anchor="middle">Motion Core</text>
  <g class="grey" font-size="14" text-anchor="middle">
    <text x="634" y="428">Real-time G2core</text>
    <text x="634" y="445">motion control</text>
  </g>

  <!-- long gold arrow to Motors -->
  <g class="gold"><rect x="730" y="364" width="372" height="16"/><path d="M1102,356 L1102,388 L1148,372 Z"/></g>
  <g text-anchor="middle">
    <text class="grey" x="838" y="340" font-size="20">I/O Hardware</text>
    <text class="grey" x="838" y="361" font-size="20">Interface</text>
    <text class="navy" x="1000" y="350" font-size="20" font-weight="bold">+ Drivers</text>
  </g>

  <circle cx="1240" cy="372" r="72" class="boxln"/>
  <g class="navy" text-anchor="middle" font-size="22" font-weight="bold">
    <text x="1240" y="353">Motors</text>
    <text x="1240" y="376">on Digital</text>
    <text x="1240" y="399">Fab Tools</text>
  </g>

  <!-- ####################  down arrow + PANEL (b) title  #################### -->
  <circle cx="392" cy="505" r="11" class="navy"/>
  <line x1="398" y1="515" x2="476" y2="579" stroke="#2D2A6D" stroke-width="13" stroke-linecap="round"/>
  <path class="navy" d="M458,571 L500,599 L480,553 Z"/>
  <text class="lbl" x="528" y="569" font-size="32" dominant-baseline="auto">CURRENT SHOPBOT INTEGRATION</text>

  <!-- ####################  PANEL (b) — SHOPBOT INTEGRATION  #################### -->
  <text class="pl" x="22" y="691">(b)</text>
  <rect x="334" y="601" width="1011" height="180" rx="8" fill="#E6E4EF" stroke="#2D2A6D" stroke-width="2" stroke-dasharray="7 6"/>

  <rect class="boxln" x="358" y="623" width="190" height="136" rx="3"/>
  <g class="navy" text-anchor="middle" font-size="21" font-weight="bold">
    <text x="453" y="669">FabMo</text>
    <text x="453" y="694">Raspberry Pi</text>
    <text x="453" y="719">Server</text>
  </g>
  <line x1="548" y1="691" x2="576" y2="691" stroke="#2D2A6D" stroke-width="2.5"/>

  <rect class="navybox" x="576" y="623" width="190" height="136" rx="3"/>
  <g class="wht" text-anchor="middle">
    <text x="671" y="665" font-size="21">ShopBot</text>
    <text x="671" y="689" font-size="21">Control Card</text>
    <text x="671" y="721" font-size="18">ARM Microcontroller</text>
  </g>
  <line x1="766" y1="691" x2="800" y2="691" stroke="#2D2A6D" stroke-width="2.5"/>

  <rect class="boxln" x="800" y="637" width="170" height="108" rx="3"/>
  <g class="navy" text-anchor="middle" font-size="20" font-weight="bold">
    <text x="885" y="669">ShopBot</text>
    <text x="885" y="691">Driver</text>
    <text x="885" y="713">Interface Board</text>
  </g>
  <line x1="970" y1="691" x2="1006" y2="691" stroke="#2D2A6D" stroke-width="2.5"/>

  <rect class="boxln" x="1006" y="661" width="100" height="60" rx="3"/>
  <text class="navy" x="1056" y="692" font-size="22" font-weight="bold" text-anchor="middle">Drivers</text>

  <g class="gold"><rect x="1110" y="683" width="26" height="16"/><path d="M1136,677 L1136,705 L1160,691 Z"/></g>
  <circle cx="1222" cy="691" r="58" class="boxln"/>
  <text class="navy" x="1222" y="692" font-size="22" font-weight="bold" text-anchor="middle">Motors</text>

  <!-- ####################  PANEL (c) — ACCESS OPTIONS  #################### -->
  <text class="pl" x="22" y="1000">(c)</text>

  <!-- NETWORK ACCESS (left, shifted right) -->
  <text class="lbl" x="180" y="862" font-size="23">NETWORK ACCESS</text>
  <line x1="312" y1="893" x2="312" y2="1198" stroke="#2D2A6D" stroke-width="3"/>
  <g text-anchor="middle">
    <rect class="boxln" x="186" y="895" width="120" height="40" rx="4"/><text class="navy" x="246" y="915" font-size="20" font-weight="bold">PC</text>
    <rect class="boxln" x="186" y="944" width="120" height="40" rx="4"/><text class="navy" x="246" y="964" font-size="20" font-weight="bold">Mac</text>
    <rect class="boxln" x="186" y="993" width="120" height="40" rx="4"/><text class="navy" x="246" y="1013" font-size="20" font-weight="bold">Linux</text>
    <rect class="boxln" x="186" y="1042" width="120" height="50" rx="4"/>
      <text class="navy" x="246" y="1059" font-size="18" font-weight="bold">Smart</text>
      <text class="navy" x="246" y="1078" font-size="18" font-weight="bold">Phone</text>
    <rect class="boxln" x="186" y="1101" width="120" height="40" rx="4"/><text class="navy" x="246" y="1121" font-size="20" font-weight="bold">Tablet</text>
    <path class="boxln" d="M212,1196 a19,19 0 0 1 12,-32 a23,23 0 0 1 42,4 a17,17 0 0 1 5,32 z"/>
      <text class="navy" x="243" y="1180" font-size="19" font-weight="bold">Cloud</text>
  </g>

  <!-- network access arrows -->
  <g class="gold">
    <rect x="350" y="935" width="7" height="30"/><rect x="361" y="935" width="7" height="30"/><rect x="372" y="935" width="7" height="30"/><path d="M389,943 L389,987 L596,965 Z"/>
    <rect x="350" y="1005" width="7" height="30"/><rect x="361" y="1005" width="7" height="30"/><rect x="372" y="1005" width="7" height="30"/><path d="M389,1013 L389,1057 L596,1035 Z"/>
    <rect x="350" y="1075" width="7" height="30"/><rect x="361" y="1075" width="7" height="30"/><rect x="372" y="1075" width="7" height="30"/><path d="M389,1083 L389,1127 L596,1105 Z"/>
  </g>
  <g class="lbl" text-anchor="middle">
    <text x="475" y="940" font-size="19">Ethernet</text>
    <text x="475" y="1010" font-size="19">WiFi</text>
    <text x="475" y="1080" font-size="18">WiFi AP-Mode</text>
  </g>

  <!-- minimal system suggestion (Engine, Core, empty interface/driver box, Motors) -->
  <rect class="dash" x="600" y="915" width="540" height="170" rx="4"/>
  <rect class="boxln" x="624" y="950" width="120" height="84" rx="3"/>
  <g class="navy" text-anchor="middle" font-size="18" font-weight="bold"><text x="684" y="982">FabMo</text><text x="684" y="1004">Engine</text></g>
  <g class="gold"><rect x="744" y="986" width="12" height="14"/><path d="M756,980 L756,1006 L774,993 Z"/></g>
  <rect class="navybox" x="756" y="950" width="120" height="84" rx="3"/>
  <g class="wht" text-anchor="middle" font-size="18"><text x="816" y="982">Motion</text><text x="816" y="1004">Core</text></g>
  <!-- empty box = I/O interface + drivers, left unlabeled -->
  <rect class="boxln" x="898" y="950" width="88" height="84" rx="3"/>
  <g class="gold"><rect x="986" y="985" width="18" height="14"/><path d="M1004,979 L1004,1007 L1026,993 Z"/></g>
  <circle cx="1062" cy="993" r="40" class="boxln"/>
  <text class="navy" x="1062" y="994" font-size="16" font-weight="bold" text-anchor="middle">Motors</text>

  <!-- DIRECT ACCESS (below) -->
  <!-- method 1: isolated PC/Mac/Phone via direct-Ethernet up into FabMo -->
  <g class="gold"><rect x="713" y="1092" width="14" height="86"/><path d="M706,1092 L734,1092 L720,1070 Z"/></g>
  <text class="lbl" x="708" y="1128" font-size="14" text-anchor="end">direct-Ethernet</text>
  <rect class="boxln" x="640" y="1178" width="160" height="58" rx="3"/>
  <text class="navy" x="720" y="1207" font-size="17" font-weight="bold" text-anchor="middle">PC, Mac, or Phone</text>

  <!-- method 2: screen + keyboard plugged straight in (moved up + adjacent to its arrow) -->
  <g class="gold"><rect x="874" y="1090" width="14" height="22"/><path d="M867,1090 L895,1090 L881,1068 Z"/></g>
  <rect class="boxln" x="840" y="1112" width="82" height="50" rx="3"/>
  <line x1="881" y1="1162" x2="881" y2="1172" stroke="#2D2A6D" stroke-width="3"/>
  <rect class="boxln" x="836" y="1172" width="90" height="18" rx="2"/>
  <g stroke="#2D2A6D" stroke-width="1.4">
    <line x1="848" y1="1172" x2="848" y2="1190"/><line x1="861" y1="1172" x2="861" y2="1190"/><line x1="874" y1="1172" x2="874" y2="1190"/><line x1="887" y1="1172" x2="887" y2="1190"/><line x1="900" y1="1172" x2="900" y2="1190"/><line x1="913" y1="1172" x2="913" y2="1190"/>
  </g>
  <text class="grey" x="938" y="1135" font-size="15">screen + keyboard</text>

  <!-- DIRECT ACCESS label, dropped lower -->
  <text class="lbl" x="640" y="1280" font-size="23">DIRECT ACCESS</text>
</svg>
