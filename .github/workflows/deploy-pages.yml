name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outcome == 'success' && steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # This repository is a static site with content served directly from the repo root.
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v5
        with:
          # Increase deploy timeout to handle occasional long Pages queue times.
          timeout: 1800000

      - name: Retry deploy to GitHub Pages
        if: steps.deployment.outcome != 'success'
        id: deployment_retry
        uses: actions/deploy-pages@v5
        with:
          # Retry once to handle transient Pages API/deployment failures.
          timeout: 1800000
